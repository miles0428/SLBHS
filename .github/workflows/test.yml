name: Tests

on:
  workflow_dispatch:
  push:
    branches: [main, v0.2.0-refactor]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgles2 libgl1 libglx0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install scikit-learn h5py pytest

      - name: Install SLBHS
        run: pip install -e .

      - name: Run tests
        run: pytest tests/ -v